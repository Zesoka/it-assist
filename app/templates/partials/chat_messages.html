<!-- Burbuja del Mensaje del Usuario -->
<div class="flex justify-end animate-in fade-in slide-in-from-bottom-2 duration-150">
    <div class="bg-brand-600 text-white rounded-2xl rounded-tr-none px-4 py-2.5 max-w-xl text-sm font-medium">
        {{ user_message }}
    </div>
</div>

<!-- Burbuja del Mensaje del Asistente (Jinja2 renderiza HTML seguro ya parseado) -->
<div class="flex justify-start animate-in fade-in slide-in-from-bottom-2 duration-200">
    <div class="bg-white text-slate-800 rounded-2xl rounded-tl-none px-4 py-3 max-w-2xl text-sm leading-relaxed border border-slate-200 shadow-sm">
        {{ assistant_message|safe }}
    </div>
</div>
