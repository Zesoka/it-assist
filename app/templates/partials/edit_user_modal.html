<div id="user-modal" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    
    <!-- Contenido del Modal -->
    <div class="bg-white rounded-2xl w-full max-w-md border border-slate-100 p-6 custom-shadow relative animate-in fade-in zoom-in-95 duration-150">
        
        <!-- Botón de Cerrar (Equina Superior) -->
        <button 
            type="button"
            onclick="document.getElementById('user-modal').remove()"
            class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 transition-colors"
        >
            <i class="fa-solid fa-xmark text-lg"></i>
        </button>

        <h3 class="text-base font-bold text-slate-900 mb-6 flex items-center gap-2">
            <i class="fa-solid fa-user-pen text-brand-600 text-sm"></i>
            <span>Editar Técnico: <span class="font-mono text-xs text-slate-500">@{{ user.username }}</span></span>
        </h3>

        <!-- Formulario que envía los cambios y actualiza el cuerpo de la tabla, cerrando el modal -->
        <form 
            hx-post="/admin/users/{{ user.id }}/edit" 
            hx-target="#user-table-body" 
            hx-swap="innerHTML"
            hx-on::after-request="document.getElementById('user-modal').remove()"
            class="space-y-4"
        >
            <div>
                <label for="edit_full_name" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Nombre Completo</label>
                <input 
                    type="text" 
                    id="edit_full_name" 
                    name="full_name" 
                    value="{{ user.full_name }}"
                    required
                    class="block w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:bg-white transition-all duration-150"
                >
            </div>

            <div>
                <label for="edit_password" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Nueva Contraseña</label>
                <input 
                    type="password" 
                    id="edit_password" 
                    name="password" 
                    placeholder="Dejar en blanco para conservar"
                    class="block w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:bg-white transition-all duration-150"
                >
            </div>

            <div>
                <label for="edit_role" class="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Rol en Sistema</label>
                <select 
                    id="edit_role" 
                    name="role" 
                    class="block w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:bg-white transition-all duration-150"
                >
                    <option value="tecnico" {% if user.role == 'tecnico' %}selected{% endif %}>Técnico de Soporte</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Administrador</option>
                </select>
            </div>

            <!-- Toggle de Estado Activo -->
            <div class="flex items-center justify-between py-2 border-t border-b border-slate-100">
                <div>
                    <span class="block text-xs font-bold text-slate-700">Usuario Activo</span>
                    <span class="block text-[10px] text-slate-400">Permite o bloquea el inicio de sesión</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input 
                        type="checkbox" 
                        name="is_active" 
                        value="true" 
                        class="sr-only peer"
                        {% if user.is_active %}checked{% endif %}
                    >
                    <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-brand-600"></div>
                </label>
            </div>

            <div class="pt-4 flex items-center justify-end gap-3">
                <button 
                    type="button" 
                    onclick="document.getElementById('user-modal').remove()"
                    class="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-700 font-semibold text-xs rounded-xl transition-all duration-150"
                >
                    Cancelar
                </button>
                <button 
                    type="submit" 
                    class="px-4 py-2 bg-brand-600 hover:bg-brand-700 text-white font-semibold text-xs rounded-xl transition-all duration-150"
                >
                    Guardar Cambios
                </button>
            </div>
        </form>
    </div>
</div>
