<div id="weather-widget" class="bg-white/10 backdrop-blur-sm border border-white/10 rounded-2xl p-4 flex flex-col justify-between min-h-[130px] text-white select-none">
    <div class="flex items-center justify-between">
        <span class="text-xs font-bold text-brand-200 uppercase tracking-wider">Información Meteorológica</span>
        <div class="text-lg text-brand-200">
            <i class="fa-solid {{ weather.icon }}"></i>
        </div>
    </div>
    
    <div class="my-1.5 flex items-baseline gap-2">
        <span class="text-3xl font-extrabold text-white tracking-tight">{{ weather.temp }}°C</span>
        <span class="text-xs font-medium text-brand-100/80">Sensación: {{ weather.feels_like }}°C</span>
    </div>

    <div>
        <div class="flex items-center gap-1 text-sm font-semibold text-white">
            <i class="fa-solid fa-location-dot text-brand-300 text-xs"></i>
            <span>{{ weather.location }}</span>
        </div>
        <p class="text-xs text-brand-100/80 capitalize mt-0.5">{{ weather.desc }}</p>
    </div>

    <!-- Mini Estadísticas en el footer -->
    <div class="mt-2.5 pt-2.5 border-t border-white/10 grid grid-cols-2 gap-2 text-[10px] font-bold text-brand-200 uppercase tracking-wider">
        <div class="flex items-center gap-1.5">
            <i class="fa-solid fa-droplet text-brand-300"></i>
            <span>Hum: {{ weather.humidity }}%</span>
        </div>
        <div class="flex items-center gap-1.5">
            <i class="fa-solid fa-wind text-brand-300"></i>
            <span>Viento: {{ weather.wind_speed }} km/h</span>
        </div>
    </div>
</div>
