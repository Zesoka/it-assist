<div id="weather-widget" class="bg-white border border-slate-100 rounded-2xl p-6 custom-shadow flex flex-col justify-between min-h-[160px]">
    <div class="flex items-center justify-between">
        <span class="text-xs font-bold text-slate-400 uppercase tracking-wider">Información Meteorológica</span>
        <div class="text-lg">
            <i class="fa-solid {{ weather.icon }}"></i>
        </div>
    </div>
    
    <div class="my-3 flex items-baseline gap-2">
        <span class="text-3xl font-extrabold text-slate-900 tracking-tight">{{ weather.temp }}°C</span>
        <span class="text-xs font-medium text-slate-500">Sensación: {{ weather.feels_like }}°C</span>
    </div>

    <div>
        <div class="flex items-center gap-1 text-sm font-semibold text-slate-800">
            <i class="fa-solid fa-location-dot text-brand-500 text-xs"></i>
            <span>{{ weather.location }}</span>
        </div>
        <p class="text-xs text-slate-500 capitalize mt-0.5">{{ weather.desc }}</p>
    </div>

    <!-- Mini Estadísticas en el footer -->
    <div class="mt-4 pt-4 border-t border-slate-100 grid grid-cols-2 gap-2 text-[10px] font-bold text-slate-400 uppercase tracking-wider">
        <div class="flex items-center gap-1.5">
            <i class="fa-solid fa-droplet text-blue-500"></i>
            <span>Humedad: {{ weather.humidity }}%</span>
        </div>
        <div class="flex items-center gap-1.5">
            <i class="fa-solid fa-wind text-slate-400"></i>
            <span>Viento: {{ weather.wind_speed }} km/h</span>
        </div>
    </div>
</div>
