{% extends "base.html" %}

{% block title %}Iniciar Sesión - Soporte IT{% endblock %}

{% block clean_content %}
<div class="w-full max-w-md bg-white rounded-2xl p-8 border border-slate-100 custom-shadow">
    <!-- Logotipo y Encabezado -->
    <div class="flex flex-col items-center mb-8">
        <div class="w-14 h-14 bg-brand-600 rounded-2xl flex items-center justify-center text-white shadow-lg shadow-brand-500/20 mb-4 animate-pulse">
            <i class="fa-solid fa-laptop-medical text-3xl"></i>
        </div>
        <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight text-center">SOPORTE TECNICO</h1>
        <p class="text-xs font-semibold text-slate-400 mt-1 text-center uppercase tracking-wider">Mesa de Soporte & Infraestructura IT</p>
    </div>

    <!-- Mensajes de Error -->
    {% if error %}
    <div class="mb-6 p-4 bg-rose-50 border-l-4 border-rose-500 rounded-xl flex items-start gap-3">
        <i class="fa-solid fa-circle-exclamation text-rose-500 mt-0.5"></i>
        <div class="text-sm font-medium text-rose-800">
            {{ error }}
        </div>
    </div>
    {% endif %}

    <!-- Formulario de Login -->
    <form action="/login" method="POST" class="space-y-5">
        <div>
            <label for="username" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Usuario de Red</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                    <i class="fa-regular fa-user"></i>
                </div>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    value="{{ username or '' }}"
                    placeholder="ej. jgarcia"
                    required
                    class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm placeholder-slate-400 text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:bg-white transition-all duration-200"
                >
            </div>
        </div>

        <div>
            <label for="password" class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Contraseña</label>
            <div class="relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••"
                    required
                    class="block w-full pl-10 pr-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-sm placeholder-slate-400 text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-brand-500 focus:bg-white transition-all duration-200"
                >
            </div>
        </div>

        <div class="pt-2">
            <button 
                type="submit" 
                class="w-full py-3 px-4 bg-brand-600 hover:bg-brand-700 active:bg-brand-800 text-white font-semibold text-sm rounded-xl transition-all duration-200 shadow-md shadow-brand-500/10 flex items-center justify-center gap-2 hover:scale-[1.01]"
            >
                <span>Acceder al Sistema</span>
                <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
            </button>
        </div>
    </form>
    
    <!-- Footer Técnico -->
    <div class="mt-8 pt-6 border-t border-slate-100 text-center">
        <span class="text-[10px] font-medium text-slate-400 uppercase tracking-widest block">Acceso Restringido a Red Interna</span>
    </div>
</div>
{% endblock %}
